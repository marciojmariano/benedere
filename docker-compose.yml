version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: benedere_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-benedere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benedere123}
      POSTGRES_DB: ${POSTGRES_DB:-benedere_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-benedere}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      # ANTES: context: . (pegava tudo, até o frontend)
      # AGORA: foca apenas no diretório do backend
      context: ./backend
      dockerfile: Dockerfile
    container_name: benedere_api
    restart: unless-stopped
    # Certifique-se que o .env está dentro de ./backend ou ajuste o caminho abaixo
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mapeia apenas o código do backend para o container
      - ./backend:/app
    # O comando assume que o diretório 'app' está dentro de 'backend'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: